name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-macos
            archive_suffix: macos-aarch64
          - target: x86_64-macos
            archive_suffix: macos-x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build macOS bundle
        run: |
          rm -rf zig-out
          zig build bundle -Dtarget=${{ matrix.target }}

      - name: Package archive
        run: |
          VERSION="${{ github.ref_type == 'tag' && github.ref_name || format('dev-{0}', github.sha) }}"
          ARCHIVE_DIR="whereami-${VERSION}-${{ matrix.archive_suffix }}"
          mkdir -p "${ARCHIVE_DIR}"
          cp -R zig-out/whereami.app "${ARCHIVE_DIR}/"
          ln -s whereami.app/Contents/MacOS/whereami "${ARCHIVE_DIR}/whereami"
          tar czf "${ARCHIVE_DIR}.tar.gz" "${ARCHIVE_DIR}"
          echo "ARCHIVE=${ARCHIVE_DIR}.tar.gz" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: whereami-${{ matrix.archive_suffix }}
          path: ${{ env.ARCHIVE }}

  build-linux-windows:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-linux
            archive_suffix: linux-x86_64
            artifact_name: whereami
            archive_ext: tar.gz
          - target: aarch64-linux
            archive_suffix: linux-aarch64
            artifact_name: whereami
            archive_ext: tar.gz
          - target: x86_64-windows
            archive_suffix: windows-x86_64
            artifact_name: whereami.exe
            archive_ext: zip
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: |
          rm -rf zig-out
          zig build -Dtarget=${{ matrix.target }}

      - name: Package archive
        run: |
          VERSION="${{ github.ref_type == 'tag' && github.ref_name || format('dev-{0}', github.sha) }}"
          ARCHIVE_DIR="whereami-${VERSION}-${{ matrix.archive_suffix }}"
          mkdir -p "${ARCHIVE_DIR}"
          cp "zig-out/bin/${{ matrix.artifact_name }}" "${ARCHIVE_DIR}/"
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            zip -r "${ARCHIVE_DIR}.zip" "${ARCHIVE_DIR}"
            echo "ARCHIVE=${ARCHIVE_DIR}.zip" >> "$GITHUB_ENV"
          else
            tar czf "${ARCHIVE_DIR}.tar.gz" "${ARCHIVE_DIR}"
            echo "ARCHIVE=${ARCHIVE_DIR}.tar.gz" >> "$GITHUB_ENV"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: whereami-${{ matrix.archive_suffix }}
          path: ${{ env.ARCHIVE }}
